name: Ecosystem Integration Test

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    uses: diggsweden/wallet-ecosystem/.github/workflows/reusable-integration.yml@3edff2af9ccbe97b9c514d4365b90e7d5cd3ed2d # main
    with:
      service-name: demo-verifier
      service-repo: ${{ github.repository }}
      service-ref: ${{ github.event.pull_request.head.sha || github.ref }}
      containerfile-path: src/main/docker/Dockerfile.build
