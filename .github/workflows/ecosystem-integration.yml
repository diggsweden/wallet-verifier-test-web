name: Ecosystem Integration Test

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    uses: diggsweden/wallet-ecosystem/.github/workflows/reusable-integration.yml@9726f19a5964e6af6104068ed181def3341328e2 # main
    with:
      service-name: demo-verifier
      service-repo: ${{ github.repository }}
      service-ref: ${{ github.event.pull_request.head.sha || github.ref }}
      containerfile-path: src/main/docker/Dockerfile.build
