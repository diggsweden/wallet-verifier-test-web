name: OpenSSF Scorecard Analysis
on:
  schedule:
    # Saturdays at 02:45 UTC
    - cron: "45 2 * * 6"
    # Wednesdays at 02:45 UTC
    - cron: "45 2 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard-analysis:
    permissions:
      contents: read
      security-events: write
      id-token: write
    uses: diggsweden/reusable-ci/.github/workflows/security-openssf-scorecard.yml@f29aac6d44b8b57f3e64120dcde531c33f8cbe36 # test feat/build-sbom-enhanced
    with:
      publish-results: true
